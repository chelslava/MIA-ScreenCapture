name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-artifacts
          path: dist/*

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build Windows EXE
        run: |
          if (-not (Test-Path "config")) {
            New-Item -ItemType Directory -Path "config" | Out-Null
          }

          pyinstaller --onefile --windowed `
            --name "MIA-ScreenCapture" `
            --add-data "config;config" `
            --hidden-import="PyQt6" `
            --hidden-import="PyQt6.QtCore" `
            --hidden-import="PyQt6.QtWidgets" `
            --hidden-import="PyQt6.QtGui" `
            --hidden-import="pyaudio" `
            --hidden-import="sounddevice" `
            --hidden-import="soundfile" `
            --hidden-import="apscheduler" `
            --hidden-import="apscheduler.schedulers.background" `
            --hidden-import="apscheduler.triggers.cron" `
            --hidden-import="apscheduler.triggers.date" `
            --hidden-import="apscheduler.triggers.interval" `
            --collect-all "windows_capture" `
            main.py

      - name: Smoke test Windows EXE
        shell: pwsh
        run: |
          $apiPort = 5015
          $exePath = Join-Path $PWD "dist/MIA-ScreenCapture.exe"
          $proc = Start-Process -FilePath $exePath -ArgumentList @(
            "--headless",
            "--api-host", "127.0.0.1",
            "--api-port", "$apiPort"
          ) -PassThru

          try {
            $ready = $false
            for ($attempt = 1; $attempt -le 30; $attempt++) {
              try {
                $response = Invoke-RestMethod `
                  -Method Get `
                  -Uri "http://127.0.0.1:$apiPort/health" `
                  -TimeoutSec 2
                if ($response.status -eq "ok") {
                  $ready = $true
                  break
                }
              }
              catch {
                Start-Sleep -Seconds 2
              }
            }

            if (-not $ready) {
              throw "Smoke test failed: /health is unavailable for EXE build."
            }
          }
          finally {
            if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
              Wait-Process -Id $proc.Id
            }
          }

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/MIA-ScreenCapture.exe

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-python, build-windows]
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-artifacts
          path: dist/python

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/windows

      - name: Generate SHA256 checksums
        run: |
          cd dist
          find . -type f -exec sha256sum {} \; > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/python/*
            dist/windows/*
            dist/SHA256SUMS
          generate_release_notes: true
