name: CI

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    name: Tests (Windows, Python ${{ matrix.python-version }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_LINK_MODE: copy
      UV_CACHE_DIR: ${{ github.workspace }}\\.uv-cache
      TEMP: ${{ github.workspace }}\\tests\\.local_tmp\\system
      TMP: ${{ github.workspace }}\\tests\\.local_tmp\\system

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        shell: pwsh
        run: |
          if (Test-Path "uv.lock") {
            uv sync --frozen --extra dev --group dev
          }
          else {
            Write-Host "uv.lock not found; running non-frozen dependency sync."
            uv sync --extra dev --group dev
          }

      - name: Prepare pytest temp directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "tests\\.local_tmp\\system" | Out-Null
          New-Item -ItemType Directory -Force -Path "tests\\.local_tmp\\pytest\\unit" | Out-Null
          New-Item -ItemType Directory -Force -Path "tests\\.local_tmp\\pytest\\integration" | Out-Null
          New-Item -ItemType Directory -Force -Path "tests\\.local_tmp\\.pytest_cache" | Out-Null

      - name: Run unit tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".ci-logs" | Out-Null
          uv run pytest tests/unit/ -v --tb=short --basetemp=tests/.local_tmp/pytest/unit 2>&1 `
            | Tee-Object -FilePath ".ci-logs/unit-tests-${{ matrix.python-version }}.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run integration tests
        shell: pwsh
        run: |
          uv run pytest `
            tests/integration/test_api_server_lifecycle.py `
            tests/integration/test_api_health_metrics.py `
            tests/integration/test_api_error_handling.py `
            tests/integration/test_api_recording_routes.py `
            tests/integration/test_api.py `
            tests/integration/test_api_extended.py `
            tests/integration/test_recording_flow.py `
            tests/integration/test_scheduler_integration.py `
            tests/integration/test_full_workflow.py `
            -v --tb=short --basetemp=tests/.local_tmp/pytest/integration 2>&1 `
            | Tee-Object -FilePath ".ci-logs/integration-tests-${{ matrix.python-version }}.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload pytest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs-${{ matrix.python-version }}
          path: .ci-logs/*.log
          if-no-files-found: ignore

  quality:
    name: Lint & Type Check (Windows, Python 3.11)
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_LINK_MODE: copy
      UV_CACHE_DIR: ${{ github.workspace }}\\.uv-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        shell: pwsh
        run: |
          if (Test-Path "uv.lock") {
            uv sync --frozen --extra dev --group dev
          }
          else {
            Write-Host "uv.lock not found; running non-frozen dependency sync."
            uv sync --extra dev --group dev
          }

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: MyPy check
        run: uv run mypy exceptions.py core/recording_types.py api/swagger.py api/auth.py api/rate_limiter.py api/schemas.py gui/models/recording_state.py recorder/encoder.py --ignore-missing-imports --follow-imports=skip

  coverage:
    name: Coverage Report
    runs-on: windows-latest
    needs: test
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_LINK_MODE: copy
      UV_CACHE_DIR: ${{ github.workspace }}\\.uv-cache
      TEMP: ${{ github.workspace }}\\tests\\.local_tmp\\system
      TMP: ${{ github.workspace }}\\tests\\.local_tmp\\system

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --extra dev --group dev

      - name: Prepare pytest temp directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "tests\\.local_tmp\\system" | Out-Null
          New-Item -ItemType Directory -Force -Path "tests\\.local_tmp\\pytest\\coverage" | Out-Null
          New-Item -ItemType Directory -Force -Path "tests\\.local_tmp\\.pytest_cache" | Out-Null

      - name: Run tests with coverage
        run: uv run pytest tests/unit/ --basetemp=tests/.local_tmp/pytest/coverage --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security-audit:
    name: Security Audit (pip-audit)
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_LINK_MODE: copy
      UV_CACHE_DIR: ${{ github.workspace }}\\.uv-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        shell: pwsh
        run: |
          if (Test-Path "uv.lock") {
            uv sync --frozen --extra dev --group dev
          }
          else {
            Write-Host "uv.lock not found; running non-frozen dependency sync."
            uv sync --extra dev --group dev
          }

      - name: Run pip-audit report
        shell: pwsh
        run: |
          $auditOutput = uvx --with pip-audit pip-audit -r requirements-dev.txt 2>&1
          $auditExitCode = $LASTEXITCODE

          if ($auditOutput) {
            $auditOutput | ForEach-Object { Write-Host $_ }
          }

          if ($auditExitCode -eq 0) {
            Write-Host "pip-audit completed: no known vulnerabilities were reported."
          }
          else {
            Write-Host "pip-audit completed: vulnerabilities or audit issues were reported above. This job is non-blocking for now."
          }
          exit 0
