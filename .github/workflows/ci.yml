name: CI

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    name: Tests (Windows, Python ${{ matrix.python-version }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    env:
      UV_LINK_MODE: copy
      TMP: ${{ github.workspace }}\\.tmp4
      TEMP: ${{ github.workspace }}\\.tmp4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Prepare temp directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.tmp4" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.tmp4\pytest" | Out-Null

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run test suite
        run: uv run pytest --basetemp .tmp4/pytest

  quality:
    name: Lint & Type Check (Windows, Python 3.11)
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      UV_LINK_MODE: copy
      TMP: ${{ github.workspace }}\\.tmp4
      TEMP: ${{ github.workspace }}\\.tmp4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Prepare temp directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.tmp4" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.tmp4\pytest" | Out-Null

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: MyPy check
        run: uv run mypy .

  security-audit:
    name: Security Audit (pip-audit)
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      UV_LINK_MODE: copy
      TMP: ${{ github.workspace }}\\.tmp4
      TEMP: ${{ github.workspace }}\\.tmp4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Prepare temp directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.tmp4" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.tmp4\pytest" | Out-Null

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run pip-audit report
        shell: pwsh
        run: |
          uv run python -m pip install --upgrade pip-audit
          $auditOutput = uv run pip-audit -r requirements-dev.txt 2>&1
          $auditExitCode = $LASTEXITCODE

          if ($auditOutput) {
            $auditOutput | ForEach-Object { Write-Host $_ }
          }

          if ($auditExitCode -eq 0) {
            Write-Host "pip-audit completed: no known vulnerabilities were reported."
          }
          else {
            Write-Host "pip-audit completed: vulnerabilities or audit issues were reported above. This job is non-blocking for now."
          }
