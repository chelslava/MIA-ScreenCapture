name: CI

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
  pull_request:
    branches:
      - "**"

jobs:
  unit-tests:
    name: Unit Tests (Windows, Python ${{ matrix.python-version }})
    runs-on: windows-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_LINK_MODE: copy
      UV_CACHE_DIR: ${{ github.workspace }}\\.uv-cache
      TEMP: ${{ github.workspace }}\\tests\\.local_tmp\\system
      TMP: ${{ github.workspace }}\\tests\\.local_tmp\\system

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --extra dev --group dev

      - name: Prepare pytest temp directories
        run: |
          New-Item -ItemType Directory -Force -Path "tests\.local_tmp\system" | Out-Null
          New-Item -ItemType Directory -Force -Path "tests\.local_tmp\pytest\unit" | Out-Null

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short --basetemp=tests/.local_tmp/pytest/unit

  integration-tests:
    name: Integration Tests (Windows, Python ${{ matrix.python-version }})
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_LINK_MODE: copy
      UV_CACHE_DIR: ${{ github.workspace }}\\.uv-cache
      TEMP: ${{ github.workspace }}\\tests\\.local_tmp\\system
      TMP: ${{ github.workspace }}\\tests\\.local_tmp\\system

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --extra dev --group dev

      - name: Prepare pytest temp directories
        run: |
          New-Item -ItemType Directory -Force -Path "tests\.local_tmp\system" | Out-Null
          New-Item -ItemType Directory -Force -Path "tests\.local_tmp\pytest\integration" | Out-Null

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --tb=short --basetemp=tests/.local_tmp/pytest/integration

  quality:
    name: Lint & Type Check (Windows, Python 3.11)
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_LINK_MODE: copy
      UV_CACHE_DIR: ${{ github.workspace }}\\.uv-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --extra dev --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: MyPy check
        run: uv run mypy main.py logger_config.py config.py core/container.py exceptions.py core/recording_types.py core/recording_service.py core/multi_recording_service.py core/api_runtime_manager.py core/api_lifecycle_manager.py core/geometry.py api/swagger.py api/auth.py api/rate_limiter.py api/schemas.py api/routes.py api/websocket.py api/server.py gui/main_window.py gui/controllers/settings_controller.py gui/controllers/recording_controller.py gui/backends/recording_backend.py gui/models/recording_state.py gui/notifications.py gui/tray_icon.py gui/hotkeys.py gui/scheduler/scheduler_tab.py gui/scheduler/task_dialog.py gui/views/__init__.py gui/views/api_settings_view.py gui/views/audio_view.py gui/views/capture_view.py gui/views/diagnostics_view.py gui/views/hotkeys_view.py gui/views/output_view.py gui/views/video_view.py recorder/encoder.py recorder/ffmpeg_writer.py recorder/audio_recorder.py recorder/utils.py recorder/video_recorder.py recorder/multi_source_recorder.py --ignore-missing-imports --follow-imports=skip

  coverage:
    name: Coverage Report
    runs-on: windows-latest
    needs: [unit-tests, integration-tests]
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_LINK_MODE: copy
      UV_CACHE_DIR: ${{ github.workspace }}\\.uv-cache
      TEMP: ${{ github.workspace }}\\tests\\.local_tmp\\system
      TMP: ${{ github.workspace }}\\tests\\.local_tmp\\system

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --extra dev --group dev

      - name: Prepare pytest temp directories
        run: |
          New-Item -ItemType Directory -Force -Path "tests\.local_tmp\system" | Out-Null
          New-Item -ItemType Directory -Force -Path "tests\.local_tmp\pytest\coverage" | Out-Null

      - name: Run tests with coverage
        run: uv run pytest tests/unit/ --basetemp=tests/.local_tmp/pytest/coverage --cov=. --cov-report=xml --cov-report=json --cov-report=term-missing --cov-fail-under=60

      - name: Gate diff coverage for changed Python files
        run: |
          $baseSha = "${{ github.event.before }}"
          if ("${{ github.event_name }}" -eq "pull_request") {
            $baseSha = "${{ github.event.pull_request.base.sha }}"
          }
          uv run python scripts/check_diff_coverage.py --coverage-json coverage.json --base-sha $baseSha --head-sha "${{ github.sha }}" --min-file-coverage 35

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security-audit:
    name: Security Audit (pip-audit)
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_LINK_MODE: copy
      UV_CACHE_DIR: ${{ github.workspace }}\\.uv-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --extra dev --group dev

      - name: Run pip-audit report
        run: |
          $auditOutput = uvx --with pip-audit pip-audit -r requirements-dev.txt 2>&1
          $auditExitCode = $LASTEXITCODE
          if ($auditOutput) {
            $auditOutput | ForEach-Object { Write-Host $_ }
          }
          if ($auditExitCode -eq 0) {
            Write-Host "pip-audit completed: no known vulnerabilities were reported."
          }
          else {
            Write-Host "pip-audit completed: vulnerabilities or audit issues were reported above. This job is non-blocking for now."
          }
          exit 0
