name: CI

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    name: Tests (Windows, Python 3.11)
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      UV_LINK_MODE: copy
      TMP: ${{ github.workspace }}\\.tmp4
      TEMP: ${{ github.workspace }}\\.tmp4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Prepare temp directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.tmp4" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.tmp4\pytest" | Out-Null

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run test suite
        run: uv run pytest --basetemp .tmp4/pytest

  quality:
    name: Lint & Type Check (Windows, Python 3.11)
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      UV_LINK_MODE: copy
      TMP: ${{ github.workspace }}\\.tmp4
      TEMP: ${{ github.workspace }}\\.tmp4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Prepare temp directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.tmp4" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.tmp4\pytest" | Out-Null

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: MyPy check
        run: uv run mypy .
