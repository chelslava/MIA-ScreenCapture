[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    slow: медленные тесты
    integration: интеграционные тесты
    windows: тесты только для Windows
    linux: тесты только для Linux
    macos: тесты только для macOS
