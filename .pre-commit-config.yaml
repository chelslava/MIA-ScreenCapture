repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        # Тот же список файлов, что в .github/workflows/ci.yml (job "quality") —
        # держать в синхроне при добавлении файлов в любой из двух мест.
        entry: uv run mypy main.py logger_config.py core/container.py exceptions.py core/recording_types.py core/recording_service.py core/api_runtime_manager.py core/api_lifecycle_manager.py api/swagger.py api/auth.py api/rate_limiter.py api/schemas.py api/routes.py api/websocket.py api/server.py gui/main_window.py gui/controllers/settings_controller.py gui/controllers/recording_controller.py gui/backends/recording_backend.py gui/models/recording_state.py gui/notifications.py gui/tray_icon.py gui/hotkeys.py gui/scheduler_tab.py gui/views/__init__.py gui/views/api_settings_view.py gui/views/audio_view.py gui/views/capture_view.py gui/views/diagnostics_view.py gui/views/output_view.py gui/views/video_view.py recorder/encoder.py recorder/ffmpeg_writer.py recorder/audio_recorder.py recorder/utils.py recorder/video_recorder.py --ignore-missing-imports --follow-imports=skip
        language: system
        pass_filenames: false
        types: [python]
