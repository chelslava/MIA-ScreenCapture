name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-artifacts
          path: dist/*

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build Windows EXE
        run: |
          if (-not (Test-Path "config")) {
            New-Item -ItemType Directory -Path "config" | Out-Null
          }

          pyinstaller --onefile --windowed `
            --name "MIA-ScreenCapture" `
            --icon "docs/assets/MIA-ScreenCapture.ico" `
            --add-data "config;config" `
            --add-data "docs/assets;docs/assets" `
            --hidden-import="PyQt6" `
            --hidden-import="PyQt6.QtCore" `
            --hidden-import="PyQt6.QtWidgets" `
            --hidden-import="PyQt6.QtGui" `
            --hidden-import="pyaudio" `
            --hidden-import="sounddevice" `
            --hidden-import="soundfile" `
            --hidden-import="apscheduler" `
            --hidden-import="apscheduler.schedulers.background" `
            --hidden-import="apscheduler.triggers.cron" `
            --hidden-import="apscheduler.triggers.date" `
            --hidden-import="apscheduler.triggers.interval" `
            --collect-all "windows_capture" `
            main.py

      - name: Smoke test Windows EXE
        shell: pwsh
        run: |
          $apiPort = 5015
          $exePath = Join-Path $PWD "dist/MIA-ScreenCapture.exe"
          $stdoutLog = Join-Path $PWD "dist/smoke-stdout.log"
          $stderrLog = Join-Path $PWD "dist/smoke-stderr.log"
          $proc = Start-Process -FilePath $exePath -ArgumentList @(
            "--headless",
            "--api-host", "127.0.0.1",
            "--api-port", "$apiPort"
          ) -PassThru -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog

          try {
            $ready = $false
            # 90 попыток x 2s = 180s — свежесобранный (несигнированный) EXE
            # на CI-раннере может ловить задержку из-за антивирусного
            # сканирования при первом запуске; 60s оказалось мало (issue
            # при релизе v1.4.8).
            for ($attempt = 1; $attempt -le 90; $attempt++) {
              if ($proc.HasExited) {
                throw "Smoke test failed: процесс EXE завершился раньше времени (exit code $($proc.ExitCode))."
              }
              try {
                $response = Invoke-RestMethod `
                  -Method Get `
                  -Uri "http://127.0.0.1:$apiPort/health" `
                  -TimeoutSec 2
                if ($response.status -eq "ok") {
                  $ready = $true
                  break
                }
              }
              catch {
                Start-Sleep -Seconds 2
              }
            }

            if (-not $ready) {
              throw "Smoke test failed: /health is unavailable for EXE build."
            }
          }
          finally {
            if ($null -ne $proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
              Wait-Process -Id $proc.Id -ErrorAction SilentlyContinue
            }
            Write-Host "--- EXE stdout ---"
            if (Test-Path $stdoutLog) { Get-Content $stdoutLog }
            Write-Host "--- EXE stderr ---"
            if (Test-Path $stderrLog) { Get-Content $stderrLog }
          }

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/MIA-ScreenCapture.exe

      - name: Build Windows Installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$version" scripts\installer.iss

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/MIA-ScreenCapture-Setup.exe

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-python, build-windows]
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-artifacts
          path: dist/python

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/windows

      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/windows

      - name: Generate SHA256 checksums
        run: |
          cd dist
          find . -type f -exec sha256sum {} \; > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/python/*
            dist/windows/*
            dist/SHA256SUMS
          generate_release_notes: true
