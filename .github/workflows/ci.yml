name: CI

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    name: Tests (Windows, Python ${{ matrix.python-version }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_LINK_MODE: copy
      UV_CACHE_DIR: ${{ github.workspace }}\\.uv-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --frozen --extra dev --group dev

      - name: Run test suite
        run: uv run pytest --basetemp "${{ runner.temp }}/pytest" -q

  quality:
    name: Lint & Type Check (Windows, Python 3.11)
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_LINK_MODE: copy
      UV_CACHE_DIR: ${{ github.workspace }}\\.uv-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --frozen --extra dev --group dev

      - name: Ruff critical check
        run: uv run ruff check . --select E9,F63,F7,F82

      - name: MyPy typed modules check
        run: uv run mypy exceptions.py api/auth.py api/schemas.py

  security-audit:
    name: Security Audit (pip-audit)
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_LINK_MODE: copy
      UV_CACHE_DIR: ${{ github.workspace }}\\.uv-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --frozen --extra dev --group dev

      - name: Run pip-audit report
        shell: pwsh
        run: |
          $auditOutput = uvx --with pip-audit pip-audit -r requirements-dev.txt 2>&1
          $auditExitCode = $LASTEXITCODE

          if ($auditOutput) {
            $auditOutput | ForEach-Object { Write-Host $_ }
          }

          if ($auditExitCode -eq 0) {
            Write-Host "pip-audit completed: no known vulnerabilities were reported."
          }
          else {
            Write-Host "pip-audit completed: vulnerabilities or audit issues were reported above. This job is non-blocking for now."
          }
          exit 0
